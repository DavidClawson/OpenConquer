name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    # Matrix over two macOS images that ship different Swift toolchains, so we
    # catch version-specific breakage in BOTH directions (e.g. a Swift 6-only
    # API that fails on 5.10, or something removed/changed in 6.x). The package
    # is swift-tools 5.9 / language mode 5, so the Swift 6 compiler builds it
    # WITHOUT strict-concurrency — this verifies compatibility, it does not opt
    # into the Swift 6 language mode.
    #   macos-14 → Swift 5.10 (Xcode 15.x)
    #   macos-15 → Swift 6.x  (Xcode 16.x)
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: brew install sdl2 pkg-config

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build -v

      - name: Build (release)
        run: swift build -c release

      # Asset-free logic tests. These self-tests build a GameWorld() in code and
      # never call loadScenario, so they run with ZERO committed assets: on a
      # fresh runner the data dir simply doesn't exist, AssetManager.initialize()
      # catches the missing-dir error and continues with 0 MIX files, and each
      # test drives the real sim and exits non-zero on failure. They print MIX
      # "NOT FOUND" / "Error loading MIX files" noise — that's expected here; CI
      # keys on the exit code, not stderr.
      - name: Logic tests (asset-free)
        run: |
          ./.build/debug/TiberianDawnMax --test-harvester-economy
          ./.build/debug/TiberianDawnMax --test-triggers-ex
          ./.build/debug/TiberianDawnMax --test-two-event
          ./.build/debug/TiberianDawnMax --test-regions
          ./.build/debug/TiberianDawnMax --test-wingate
          ./.build/debug/TiberianDawnMax --test-winlose
          ./.build/debug/TiberianDawnMax --test-initteams
          ./.build/debug/TiberianDawnMax --test-enemy-superweapon
          ./.build/debug/TiberianDawnMax --test-eventparity
          # Full-tick determinism net on a scenario fabricated in code (no MIX):
          ./.build/debug/TiberianDawnMax --test-synthetic 500

      # NOTE: the --determinism and the remaining --test-* suites load scenarios
      # from MIX, which require assets extracted from a user's own Remastered
      # Collection. Those assets are never committed, so the scenario-backed tests
      # run locally, not in CI (see CONTRIBUTING.md). --test-synthetic above is the
      # asset-free equivalent that gives CI a real determinism regression net.
