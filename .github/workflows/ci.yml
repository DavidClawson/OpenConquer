name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    # Matrix over two macOS images that ship different Swift toolchains, so we
    # catch version-specific breakage in BOTH directions (e.g. a Swift 6-only
    # API that fails on 5.10, or something removed/changed in 6.x). The package
    # is swift-tools 5.9 / language mode 5, so the Swift 6 compiler builds it
    # WITHOUT strict-concurrency — this verifies compatibility, it does not opt
    # into the Swift 6 language mode.
    #   macos-14 → Swift 5.10 (Xcode 15.x)
    #   macos-15 → Swift 6.x  (Xcode 16.x)
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: brew install sdl2 pkg-config

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build -v

      - name: Build (release)
        run: swift build -c release

      # NOTE: the --determinism / --test-* suites load game scenarios, which
      # require assets extracted from a user's own Remastered Collection. Those
      # assets are never committed, so the gameplay tests run locally rather than
      # in CI (see CONTRIBUTING.md). A near-term roadmap item is a set of tiny
      # asset-free synthetic fixtures so a subset of logic tests can run here too.
